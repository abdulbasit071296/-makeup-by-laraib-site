<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug</title>
  <style>
    body { font-family: monospace; font-size: 13px; padding: 12px; background: #111; color: #0f0; white-space: pre-wrap; word-break: break-word; }
    .bad { color: #f55; font-weight: bold; }
    .ok { color: #5f5; }
    h2 { color: #ff0; font-size: 14px; margin: 16px 0 4px; }
    iframe { width: 375px; height: 700px; border: 2px solid #0f0; }
  </style>
</head>
<body>
  <h2>Basics</h2>
  <div id="basics">loading...</div>

  <h2>Real Page: Hero Video</h2>
  <div id="video-info">loading...</div>

  <h2>Real Page: Instagram Track</h2>
  <div id="insta-info">loading...</div>

  <h2>Real Page: Gallery Track</h2>
  <div id="gallery-info">loading...</div>

  <h2>JS Errors Caught (this page)</h2>
  <div id="errors">none yet</div>

  <h2>Live iframe of the real index.html (scroll it to Instagram)</h2>
  <iframe id="real-page" src="index.html"></iframe>

  <script>
    var errorLog = [];
    window.onerror = function(msg, url, line, col, err) {
      errorLog.push(msg + " (line " + line + ")");
      document.getElementById("errors").textContent = errorLog.join("\n");
      document.getElementById("errors").className = "bad";
    };

    function fmt(obj) {
      return Object.keys(obj).map(function(k) { return k + ": " + obj[k]; }).join("\n");
    }

    document.getElementById("basics").textContent = fmt({
      userAgent: navigator.userAgent,
      screenSize: screen.width + "x" + screen.height,
      viewportSize: window.innerWidth + "x" + window.innerHeight,
      devicePixelRatio: window.devicePixelRatio,
      time: new Date().toString()
    });

    var frame = document.getElementById("real-page");
    var videoDiv = document.getElementById("video-info");
    var instaDiv = document.getElementById("insta-info");
    var galleryDiv = document.getElementById("gallery-info");
    var lastVideoTime = -1, stuckCount = 0;

    function poll() {
      var doc;
      try {
        doc = frame.contentDocument;
      } catch (e) {
        videoDiv.textContent = "Cannot access iframe: " + e.message;
        return;
      }
      if (!doc || !doc.body) {
        videoDiv.textContent = "iframe not loaded yet";
        instaDiv.textContent = "iframe not loaded yet";
        galleryDiv.textContent = "iframe not loaded yet";
        return;
      }

      var v = doc.querySelector(".hero-visual-video");
      if (v) {
        var vinfo = {
          currentTime: v.currentTime.toFixed(2),
          paused: v.paused,
          readyState: v.readyState,
          networkState: v.networkState,
          error: v.error ? (v.error.code + ": " + v.error.message) : "none"
        };
        if (v.currentTime === lastVideoTime) stuckCount++; else stuckCount = 0;
        lastVideoTime = v.currentTime;
        vinfo.stuckChecks = stuckCount;
        videoDiv.textContent = fmt(vinfo);
        videoDiv.className = stuckCount > 3 ? "bad" : "ok";
      } else {
        videoDiv.textContent = "video element not found in iframe";
      }

      var track = doc.getElementById("insta-track");
      if (track) {
        var cs = doc.defaultView.getComputedStyle(track);
        var items = track.children;
        var imgsLoaded = 0, imgsTotal = 0;
        for (var i = 0; i < items.length; i++) {
          var img = items[i].querySelector("img");
          if (img) {
            imgsTotal++;
            if (img.complete && img.naturalWidth > 0) imgsLoaded++;
          }
        }
        var firstRect = items[0] ? items[0].getBoundingClientRect() : null;
        instaDiv.textContent = fmt({
          childCount: items.length,
          imagesLoaded: imgsLoaded + " / " + imgsTotal,
          trackWidth: track.offsetWidth,
          trackHeight: track.offsetHeight,
          animationName: cs.animationName,
          animationPlayState: cs.animationPlayState,
          opacity: cs.opacity,
          display: cs.display,
          visibility: cs.visibility,
          transform: cs.transform,
          firstItemRect: firstRect ? (firstRect.width + "x" + firstRect.height + " at " + firstRect.x.toFixed(0) + "," + firstRect.y.toFixed(0)) : "n/a"
        });
      } else {
        instaDiv.textContent = "insta-track element not found in iframe";
      }

      var gTrack = doc.getElementById("gallery-track");
      if (gTrack) {
        galleryDiv.textContent = fmt({
          childCount: gTrack.children.length,
          trackWidth: gTrack.offsetWidth
        });
      } else {
        galleryDiv.textContent = "gallery-track element not found in iframe";
      }
    }

    frame.addEventListener("load", function() {
      setInterval(poll, 500);
    });
  </script>
</body>
</html>
